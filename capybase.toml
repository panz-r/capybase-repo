# capybase.toml — runtime configuration for the capybase rebase agent.
#
# Copy this file into your repo (or pass --config PATH) and adjust as needed.
# Packaging metadata lives in pyproject.toml; this file is runtime only.

[model]
# OpenAI-compatible local endpoint (e.g. llama-server).
provider = "openai_compatible"
base_url = "http://192.168.1.123:8080/v1"
api_key = "sk-local"
model = "vibethink"
temperature = 0.2
samples = 1
# Difficulty-aware sample allocation (survey §4 UAB-lite): when [routing] is
# enabled and a unit classifies as "complex", draw this many samples instead of
# the base `samples`. Concentrates test-time compute on multi-hunk files and
# large enclosing nodes where a small model struggles. 0 = disabled (complex
# units use `samples`); only consulted on fresh resolves, not CEGIS retries.
samples_complex = 0
# Self-consistency: raise samples (e.g. 5) and set [future] enable_self_consistency
# = true to enable majority voting over N samples. Below this agreement fraction
# the merge is flagged low-confidence.
consensus_min_agreement = 0.4
# Two-pass prompting: extract intents first, then generate code conditioned on
# them. Only activates when samples > 1.
two_pass = false
# Raised temperature for the diverse multi-sampling pass (distinct from the low
# `temperature` used for focused retries).
sampling_temperature = 0.7
# Draw samples concurrently in a thread pool (safe: adapter is stateless/call).
parallel_samples = true
# Reasoning models (e.g. VibeThinker/DeepSeek-R1 style) emit long <think> chains
# before answering. If this is too low, the model runs out of tokens mid-thought
# (finish_reason=length) and never emits its JSON answer -> empty resolution.
max_tokens = 8192
request_timeout_seconds = 600
# Hard wall-clock cap on one generation attempt. A stalled stream aborts and
# becomes a retryable failure rather than hanging indefinitely.
generation_timeout_seconds = 180

[policy]
# Which conflict types (git unmerged modes) capybase will attempt.
supported_conflict_types = ["UU"]
# Which file kinds are eligible for auto-resolution.
supported_file_kinds = ["text"]
max_retries_per_unit = 2
allow_skip = false
allow_delete_conflicted_file = false
stage_only_validated_paths = true
# Number of context lines on each side of a conflict marker block.
context_lines = 15

[tests]
pre_continue = "pytest"
final = "pytest"
timeout_seconds = 300
required = true

[validation]
require_no_markers = true
require_exact_splice_scope = true
require_syntax_if_supported = true
reject_if_copies_one_side = true
reject_if_model_needs_human = true
require_whole_file_validation = true
require_ast_preservation = true
# LSP / type-checker (Phase B): reject candidates introducing NEW type/compile
# errors. Requires pyright (pip install pyright) or rust-analyzer. Inert when
# the tool is absent.
enable_lsp_diagnostics = false
pyright_path = "pyright"
rust_analyzer_path = "rust-analyzer"
cargo_path = "cargo"
lsp_baseline_strict = true
# Shadow tests (Phase B): run tests/test_<module>.py for a modified module
# before declaring success (warning severity, best-effort).
enable_shadow_tests = false
# Verifier-model critic (surveys §1/§5): an LLM judge that checks the
# resolution preserves BOTH sides' semantic intent — the one failure the
# syntactic validators are blind to (a merge that parses cleanly but drops a
# side's intent). Uses the same black-box API as the resolver; no model is
# trained or hosted. Inert + zero calls when false.
enable_verifier_model = false
# Critic disagreement severity: "warning" (bias toward retry/escalate) or
# "error" (hard-reject a dropped-intent resolution).
verifier_severity = "warning"
# VeriGuard-style deterministic policy gate (survey §4): statically extract
# import/call facts from each candidate's resolved text (stdlib ast, Python
# only) and evaluate them against [[validation.policy_rules]]. The ONLY check
# that inspects WHAT a patch introduces — catches a clean-but-unsafe merge
# (e.g. adds subprocess to api/). Deterministic at runtime: no LLM, no
# execution. Inert when false OR no rules configured.
enable_policy_gate = false
# Each rule is [[validation.policy_rules]]. kind = "forbid_import" (matches when
# `pattern` is a prefix of any imported module) or "forbid_call" (matches when
# `pattern` is a prefix of any call target). severity "error" hard-blocks,
# "warning" flags. Uncomment and edit for your deployment, e.g.:
# [[validation.policy_rules]]
# name = "no_subprocess"
# kind = "forbid_import"
# pattern = "subprocess"
# severity = "error"
# reason = "subprocess is forbidden in auto-merged code"
#
# [[validation.policy_rules]]
# name = "no_eval"
# kind = "forbid_call"
# pattern = "eval"
# severity = "error"
# reason = "eval/exec are forbidden"

[journal]
enabled = true
store_prompts = true
store_raw_responses = true
store_snapshots = true
store_candidates = true

# Tree-sitter AST context (requires the `structural` extra: pip install -e ".[structural]").
# When enabled and the grammars are installed, the resolver sees the enclosing
# logical block (def/impl/struct) instead of a blind line window, and an
# AST-preservation validator guards against silent deletion of unchanged code.
# Silently degrades to the line-window behavior if tree-sitter is absent.
[structural]
enabled = false
languages = ["python", "rust"]
# If the lowest enclosing node is larger than this (lines), fall back to the
# line window — a whole 500-line module is not a useful "isolated block".
max_enclosing_node_lines = 60
cross_file_slice = true
slice_search_globs = ["**/*.py", "**/*.rs"]
# Use the enclosing AST node as primary context instead of the line window.
use_enclosing_as_primary = true
# Strip comment lines, docstrings, and blank runs from the context window.
canonicalize_context = true
# Refine conflict boundaries with `git merge-file --diff3` for the tightest
# possible marker span.
refine_with_diff3 = true

# RAG experience replay: store labeled outcomes, retrieve similar past merges
# as dynamic few-shot. Requires [future] enable_rag = true to activate.
# The store accumulates from every capybase run; no manual labeling needed.
[memory]
enabled = false
store_path = ".rebase-agent/memory/experiences.jsonl"
retriever = "lexical"        # "lexical" (BM25, no deps) or "embedding" (future)
retriever_k = 3
min_examples_for_retrieval = 3

# Calibrated risk routing: replace the rules accept/escalate threshold with a
# learned one. Fit offline with scripts/fit_calibration.py once enough data
# accumulates; the fitted model is pure-Python inference (no sklearn at runtime).
[calibration]
enabled = false
model_path = ".rebase-agent/memory/calibration.json"
escalate_threshold = 0.7
min_examples_for_calibration = 50
# Consensus entropy above this → escalate (high-entropy splits mean no candidate
# is trustworthy even if one passed validators). 0=unanimous, 1=max split.
entropy_escalate_threshold = 0.8
# Conformal prediction coverage (1-alpha). Fit with scripts/fit_calibration.py
# --conformal; the p-value threshold guarantees this coverage of accepted merges.
conformal_alpha = 0.1

# [future] documents planned seams. It does nothing in the MVP.
[future]
enable_self_consistency = false   # raise [model] samples + set true for majority voting
enable_rag = false                # set true + [memory] enabled = true for RAG few-shot
enable_structural_context = false  # set true + [structural] enabled = true for AST context
enable_verifier_model = false
enable_mutation_testing = false
